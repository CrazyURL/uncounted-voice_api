[pytest]
markers =
    unit: Unit tests (fast, no IO)
    slow: Slow tests (3+ seconds)
    gpu: GPU-dependent tests
    real_audio: Tests requiring real audio files

addopts = -m "not slow and not gpu and not real_audio"
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
